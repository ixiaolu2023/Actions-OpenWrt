name: Build OpenWrt for 360T7 (MT7981BA)

# 触发方式：手动触发 + 每周五8点自动触发（可选）
on:
  repository_dispatch:
  workflow_dispatch:  # 核心：手动触发编译（推荐）
  schedule:
    - cron: 0 8 * * 5

# 全局环境变量
env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config.env
  CUSTOMIZE_SH: customize.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 解决Node.js 20弃用警告

jobs:
  build:
    runs-on: ubuntu-22.04  # 编译环境
    permissions:
      contents: write  # 赋予发布固件到Release的权限

    steps:
      # 1. 拉取仓库代码
      - name: Checkout
        uses: actions/checkout@v4.2.2  # 升级到支持Node.js 24的版本

      # 2. 初始化编译环境（解决权限/依赖问题）
      - name: Initialization environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          # 清理源并安装编译依赖（移除swap创建逻辑，避免权限错误）
          sudo rm -rf /etc/apt/sources.list.d/*
          sudo apt update -y
          sudo apt full-upgrade -y
          sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl jq tmux git subversion patch gcc-arm-linux-gnueabi
          sudo apt autoremove -y
          sudo apt clean -y
          
          # 设置时区
          sudo timedatectl set-timezone "$TZ"
          
          # 确保编译目录有读写权限
          mkdir -p $GITHUB_WORKSPACE/openwrt
          chmod -R 777 $GITHUB_WORKSPACE

      # 3. 克隆ImmortalWrt源码（适配360T7 MT7981BA）
      - name: Clone source code
        run: |
          # 克隆源码到绝对路径，避免相对路径错误
          git clone --depth=1 $REPO_URL -b $REPO_BRANCH $GITHUB_WORKSPACE/openwrt
          cd $GITHUB_WORKSPACE/openwrt
          
          # 验证源码克隆是否成功
          if [ ! -f "README.md" ]; then
            echo "Error: 源码克隆失败！"
            exit 1
          fi

      # 4. 加载自定义插件源（passwall/openclash/定时重启）
      - name: Load custom feeds
        run: |
          cd $GITHUB_WORKSPACE/openwrt
          
          # 复制自定义插件源配置（若存在）
          if [ -f $GITHUB_WORKSPACE/$FEEDS_CONF ]; then
            cp $GITHUB_WORKSPACE/$FEEDS_CONF ./feeds.conf.default
          fi
          
          # 添加所需插件源
          cat >> feeds.conf.default <<EOF
          src-git passwall https://github.com/xiaorouji/openwrt-passwall.git;main
          src-git passwall_packages https://github.com/xiaorouji/openwrt-passwall-packages.git;main
          src-git openclash https://github.com/vernesong/OpenClash.git;dev
          src-git autoreboot https://github.com/sirpdboy/luci-app-autoreboot.git;master
          EOF
          
          # 更新并安装所有插件
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # 5. 配置自定义参数（机型/插件/主题）
      - name: Configure custom settings
        run: |
          cd $GITHUB_WORKSPACE/openwrt
          
          # 复制自定义配置文件（network/system/wireless等）
          if [ -d $GITHUB_WORKSPACE/files ]; then
            cp -rf $GITHUB_WORKSPACE/files ./
          fi
          
          # 执行自定义脚本（若存在）
          if [ -f $GITHUB_WORKSPACE/$CUSTOMIZE_SH ]; then
            cp $GITHUB_WORKSPACE/$CUSTOMIZE_SH ./customize.sh
            chmod +x ./customize.sh
            ./customize.sh
          fi
          
          # 生成360T7核心编译配置
          cat > .config <<EOF
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_360_t7=y
          CONFIG_LUCI_THEME="argone"
          
          # 预装插件
          CONFIG_PACKAGE_luci-theme-argone=y
          CONFIG_PACKAGE_luci-app-passwall=y
          CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y
          CONFIG_PACKAGE_passwall-all=y
          CONFIG_PACKAGE_luci-app-openclash=y
          CONFIG_PACKAGE_luci-i18n-openclash-zh-cn=y
          CONFIG_PACKAGE_luci-app-zerotier=y
          CONFIG_PACKAGE_zerotier=y
          CONFIG_PACKAGE_luci-app-autoreboot=y
          CONFIG_PACKAGE_luci-i18n-autoreboot-zh-cn=y
          EOF
          
          # 加载配置
          make defconfig

      # 6. 下载编译依赖包
      - name: Download packages
        run: |
          cd $GITHUB_WORKSPACE/openwrt
          
          # 下载依赖
          make download -j$(nproc)
          
          # 清理无效依赖包
          find dl -size -1024c -exec rm -f {} \;
          
          # 验证依赖下载
          if [ ! -d "dl" ]; then
            echo "Error: 依赖包下载失败！"
            exit 1
          fi

      # 7. 编译固件（单线程避免内存不足）
      - name: Build firmware
        run: |
          cd $GITHUB_WORKSPACE/openwrt
          
          # 单线程编译（GitHub Runner资源有限）
          make -j1 V=s
          
          # 验证固件是否生成
          if [ ! -d "bin/targets" ]; then
            echo "Error: 固件编译失败！"
            exit 1
          fi

      # 8. 上传bin目录（包含所有编译产物）
      - name: Upload bin directory
        if: env.UPLOAD_BIN_DIR == 'true' && !cancelled()
        uses: actions/upload-artifact@v4.3.4
        with:
          name: OpenWrt_bin
          path: $GITHUB_WORKSPACE/openwrt/bin

      # 9. 整理固件文件（只保留360T7可用固件）
      - name: Organize files
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        run: |
          # 定位360T7固件目录（filogic架构）
          FIRMWARE_DIR=$(find $GITHUB_WORKSPACE/openwrt/bin/targets -type d -name "filogic")
          if [ -z "$FIRMWARE_DIR" ]; then
            echo "Error: 固件目录不存在！"
            exit 1
          fi
          
          # 清理冗余包
          cd $FIRMWARE_DIR
          rm -rf packages
          
          # 记录固件目录路径
          echo "FIRMWARE=$FIRMWARE_DIR" >> $GITHUB_ENV

      # 10. 上传固件目录（最终可刷写的固件）
      - name: Upload firmware directory
        if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
        uses: actions/upload-artifact@v4.3.4
        with:
          name: OpenWrt_firmware
          path: ${{ env.FIRMWARE }}

      # 11. 发布固件到GitHub Release
      - name: Upload firmware to release
        if: env.UPLOAD_RELEASE == 'true' && !cancelled()
        uses: softprops/action-gh-release@v2.0.8
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: 360T7-MT7981BA-$(date +%Y%m%d)
          files: ${{ env.FIRMWARE }}/*
          body: |
            360T7 (MT7981BA) ImmortalWrt固件
            ✅ 基础配置：LAN=192.168.5.1 | root密码=password | 主机名=OpenWrt
            ✅ WiFi配置：2.4G=OpenWrt-2.4G | 5G=OpenWrt-5G | 密码=12345678（PSK2加密）
            ✅ 预装插件：passwall、OpenClash（含ARM内核）、zerotier、定时重启
            ✅ 默认主题：argone
