name: Build OpenWrt for 360T7 (MT7981BA)

on:
  repository_dispatch:
  workflow_dispatch:  # 手动触发（推荐）
  schedule:
    - cron: 0 8 * * 5

env:
  # 继承P3TERX模板环境变量
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-23.05
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: config.env
  CUSTOMIZE_SH: customize.sh
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  UPLOAD_COWTRANSFER: false
  UPLOAD_WETRANSFER: false
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/*
        sudo apt update -y
        sudo apt full-upgrade -y
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl jq tmux git subversion patch gcc-arm-linux-gnueabi
        sudo apt autoremove -y
        sudo apt clean -y
        # 安装P3TERX依赖
        sudo timedatectl set-timezone "$TZ"
        curl -fsSL https://raw.githubusercontent.com/P3TERX/dotfiles/master/scripts/openwrt-build.sh | bash -s init

    - name: Clone source code
      run: |
        df -hT $PWD
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf $PWD/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        cd openwrt
        cat >> feeds.conf.default <<EOF
        $ADD_FEEDS
        EOF
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Configure custom settings
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        [ -e $CUSTOMIZE_SH ] && mv $CUSTOMIZE_SH openwrt/customize.sh
        cd openwrt
        chmod +x customize.sh
        ./customize.sh

    - name: Download packages
      run: |
        cd openwrt
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Build firmware
      run: |
        cd openwrt
        echo -e "$(nproc) thread build."
        make -j$(nproc) || make -j1 V=s
        echo "======================="
        echo "Build firmware finished!"
        echo "======================="

    - name: Upload bin directory
      if: env.UPLOAD_BIN_DIR == 'true' && !cancelled()
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_bin
        path: openwrt/bin

    - name: Organize files
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "======================="
        echo "Organize files finished!"
        echo "======================="

    - name: Upload firmware directory
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt_firmware
        path: ${{ env.FIRMWARE }}

    - name: Upload firmware to release
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: 360T7-MT7981BA-$(date +%Y%m%d)
        files: ${{ env.FIRMWARE }}/*
